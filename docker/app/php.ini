; Базовые настройки
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 120
memory_limit = 128M

; OpCache
opcache.enable=1
opcache.memory_consumption=128
opcache.max_accelerated_files=10000
opcache.revalidate_freq=2

; Временная зона
date.timezone = UTC

; Для логов
error_reporting = E_ALL
log_errors = On